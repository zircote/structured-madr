name: CI

# Attested quality-gate backbone. Calls the org's centralized reusable gates
# from modeled-information-format/.github (SHA-pinned), plus the native Astro
# build and the repo's own ADR validation (the structured-madr action,
# dogfooded). No path filters: every gate runs on every PR so each can serve as
# a reliable required status check.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Supply-chain / enforcement ────────────────────────────────────────────
  pin-check:
    permissions:
      contents: read
    uses: modeled-information-format/.github/.github/workflows/pin-check.yml@f83ee8058630235396f7242580570b26cf3617fa

  actionlint:
    permissions:
      contents: read
    uses: modeled-information-format/.github/.github/workflows/reusable-actionlint.yml@f83ee8058630235396f7242580570b26cf3617fa

  # ── Security gates ────────────────────────────────────────────────────────
  secrets:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: modeled-information-format/.github/.github/workflows/reusable-secrets.yml@a9ea785d2f7b9e8d70c5ce763dde2cd74af28bd1
    with:
      directory: .

  sast:
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read
    uses: modeled-information-format/.github/.github/workflows/reusable-sast-codeql.yml@f83ee8058630235396f7242580570b26cf3617fa
    with:
      languages: 'javascript-typescript,actions'

  sca:
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
    uses: modeled-information-format/.github/.github/workflows/reusable-sca-osv.yml@f83ee8058630235396f7242580570b26cf3617fa
    with:
      fail-on-severity: high

  # ── Native build (validates the Starlight site + all internal links) ──────
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  # ── ADR validation (dogfoods the repo's own action) ──────────────────────
  validate-project-adrs:
    name: Validate Project ADRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate project ADRs
        uses: ./
        with:
          path: docs/decisions
          strict: 'false'

  validate-examples:
    name: Validate Example ADRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate example ADRs
        uses: ./
        with:
          path: examples
          strict: 'false'

  # ── MIF compliance (vendored-schema integrity + dogfooded MIF gate) ───────
  mif-vendor-check:
    name: MIF Vendor Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify vendored MIF schemas match VENDOR.lock
        run: node .github/bin/vendor-check.js

  validate-mif:
    name: Validate MIF Conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: MIF conformance gate (level from .github/config.yml)
        uses: ./
        with:
          mode: mif
          path: docs/decisions
