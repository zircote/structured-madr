name: Scorecard

# OpenSSF Scorecard supply-chain posture. Posture/badge gate — runs on pushes to
# the default branch, on a weekly schedule, and when branch protection changes.
# Not a per-PR required check.

on:
  push:
    branches: [main]
  schedule:
    - cron: '37 4 * * 1'  # weekly, Monday ~04:37 UTC (scattered minute)
  branch_protection_rule:

permissions:
  contents: read

jobs:
  scorecard:
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    uses: modeled-information-format/.github/.github/workflows/reusable-scorecard.yml@a9ea785d2f7b9e8d70c5ce763dde2cd74af28bd1
